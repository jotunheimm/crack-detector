name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect OpenCV ffmpeg DLL path
        id: ocv
        run: |
          python -c "
import cv2, os, glob
base = os.path.dirname(cv2.__file__)
dlls = glob.glob(os.path.join(base, '*ffmpeg*.dll'))
print('OPENCV_DIR=' + base)
print('FFMPEG_DLLS=' + ';'.join(dlls))
" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build .exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --add-data "best.pt;."
          --add-binary "${{ steps.ocv.outputs.OPENCV_DIR }}\opencv_videoio_ffmpeg*.dll;."
          --hidden-import="cv2"
          --name "CrackScan" app.py

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: CrackScan-Windows
          path: dist/CrackScan.exe
          retention-days: 30
