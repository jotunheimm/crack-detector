name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ultralytics opencv-python pillow numpy pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --add-data "best.pt;." `
            --name "CrackScan" `
            app.py

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: CrackScan-Windows
          path: dist/CrackScan.exe
          retention-days: 30
```

---

**STEP 5 — Update requirements.txt**

Click `requirements.txt` in VS Code sidebar, make sure it has exactly this, then `Cmd + S`:
```
ultralytics
opencv-python
pillow
numpy
pyinstaller