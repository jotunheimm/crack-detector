name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Copy OpenCV ffmpeg DLL
        run: |
          python -c "
import cv2, os, glob, shutil
base = os.path.dirname(cv2.__file__)
dlls = glob.glob(os.path.join(base, '*ffmpeg*.dll'))
for dll in dlls:
    shutil.copy(dll, '.')
    print('Copied:', dll)
"
        shell: pwsh

      - name: Build .exe
        run: pyinstaller --noconfirm --onefile --windowed --add-data "best.pt;." --hidden-import="cv2" --name "CrackScan" app.py

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: CrackScan-Windows
          path: dist/CrackScan.exe
          retention-days: 30
